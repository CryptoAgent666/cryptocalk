<!-- Favicon: Calculator icon (Lucide) on gradient purple background -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- Lucide Calculator icon, scaled and centered (original 24x24 → ~20x20, offset by 6,6) -->
  <g transform="translate(6,6) scale(0.833)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Calculator body -->
    <rect x="2" y="2" width="20" height="20" rx="2"/>
    <!-- Display bar -->
    <line x1="8" y1="6" x2="16" y2="6"/>
    <!-- Buttons row 1 -->
    <line x1="16" y1="10" x2="16" y2="14"/>
    <line x1="14" y1="12" x2="18" y2="12"/>
    <!-- Small squares for other buttons -->
    <line x1="8" y1="10" x2="8" y2="10"/>
    <line x1="12" y1="10" x2="12" y2="10"/>
    <line x1="8" y1="14" x2="8" y2="14"/>
    <line x1="12" y1="14" x2="12" y2="14"/>
    <line x1="8" y1="18" x2="8" y2="18"/>
    <line x1="12" y1="18" x2="12" y2="18"/>
    <!-- Equals button (wide) -->
    <line x1="14" y1="17" x2="18" y2="17"/>
    <line x1="14" y1="19" x2="18" y2="19"/>
  </g>
</svg>
